name: Build

# ============================================================
#  IEI Timer Faster 跨平台构建 CI
#  INSPUR-80: Windows + macOS 并行打包
#
#  触发方式:
#    - push tag v* (如 v1.0.0)
#    - 手动触发 (Actions 页面 → Run workflow)
#
#  产物 (下载路径: Actions → 选择运行 → Artifacts):
#    - Windows: IEI_Timer_Faster_Setup.exe (Inno Setup 安装包)
#    - macOS:   IEI_Timer_Faster_Setup.dmg (磁盘镜像)
# ============================================================

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:

  # ==========================================================
  #  ISCC 编译检查 — 每次 push/PR 到 main 都跑
  #  只编译 setup.iss，不做 PyInstaller 打包，不上传 artifact
  #  编译失败直接阻断，用于在开发阶段尽早发现问题
  # ==========================================================
  check-iscc:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint setup.iss (brace GUID check)
        shell: bash
        run: |
          # Scan [Code] section for brace GUID patterns
          # The { } in Pascal comments/literals cause ISCC Syntax error.
          # Catch it early — no ISCC install needed for this scan.
          # INSPUR-95: 5 rounds of the same bug class, scan proactively.
          in_code=0
          line_num=0
          errors=0
          while IFS= read -r line; do
            line_num=$((line_num + 1))
            if [[ "$line" =~ ^\[Code\] ]]; then
              in_code=1
              continue
            fi
            if [[ "$line" =~ ^\[ && ! "$line" =~ ^\[Code\] ]]; then
              in_code=0
            fi
            if [ $in_code -eq 1 ] && echo "$line" | grep -qP '\{[A-Fa-f0-9]{8}-[A-Fa-f0-9]{4}'; then
              echo "  [X] Line $line_num: potential brace GUID in [Code] section"
              echo "      $line"
              errors=$((errors + 1))
            fi
          done < service_installer/installer/setup.iss
          if [ $errors -gt 0 ]; then
            echo ""
            echo "[X] Found $errors brace GUID issue(s) in [Code] Pascal context."
            echo "    Replace {GUID} -> [[GUID]] in comments, or {{GUID}} in string literals."
            exit 1
          fi
          echo "[OK] No brace GUID patterns in [Code] section."

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Compile setup.iss (ISCC syntax check)
        shell: cmd
        run: |
          set "ISCC="
          if exist "%LOCALAPPDATA%\Programs\Inno Setup 6\ISCC.exe" set "ISCC=%LOCALAPPDATA%\Programs\Inno Setup 6\ISCC.exe"
          if not defined ISCC if exist "%ProgramFiles%\Inno Setup 6\ISCC.exe" set "ISCC=%ProgramFiles%\Inno Setup 6\ISCC.exe"
          if not defined ISCC if exist "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" set "ISCC=C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if not defined ISCC (echo [X] ISCC not found & exit /b 1)
          echo [OK] ISCC: %ISCC%
          "%ISCC%" /O%RUNNER_TEMP% /Qp "service_installer\installer\setup.iss" || exit /b %errorlevel%
          echo [OK] ISCC compilation check passed

  # ==========================================================
  #  Windows 构建 (仅 tag push 触发)
  # ==========================================================
  build-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r service_installer/requirements.txt pyinstaller

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Install Chinese language for ISCC
        shell: cmd
        run: |
          for %%d in (
            "%LOCALAPPDATA%\Programs\Inno Setup 6"
            "%ProgramFiles%\Inno Setup 6"
            "C:\Program Files (x86)\Inno Setup 6"
          ) do if exist "%%~d\ISCC.exe" (
            curl -sSL -o "%%~d\Languages\ChineseSimplified.isl" "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl"
            echo [OK] Installed ChineseSimplified.isl to %%~d\Languages
            goto :done_isl
          )
          echo [X] Could not find Inno Setup to install language
          :done_isl

      - name: Build (PyInstaller)
        shell: cmd
        working-directory: service_installer
        run: |
          echo === Python check ===
          python --version
          echo === PyInstaller check ===
          python -m pip show pyinstaller
          if exist "dist\IEI Timer Faster" rmdir /s /q "dist\IEI Timer Faster"
          echo === Build start ===
          python -m PyInstaller --noconfirm service.spec || exit /b %errorlevel%
          echo === Build done ===
          if not exist "dist\IEI Timer Faster\IEI Timer Faster.exe" (
            echo [X] PyInstaller build failed: IEI Timer Faster.exe not found
            dir dist 2>nul || echo "(dist/ does not exist)"
            exit /b 1
          )

      - name: Build (Inno Setup installer)
        shell: cmd
        run: |
          set /p VERSION=<VERSION
          echo === Building IEI Timer Faster Setup v%VERSION% ===
          set "ISCC="
          if exist "%LOCALAPPDATA%\Programs\Inno Setup 6\ISCC.exe" set "ISCC=%LOCALAPPDATA%\Programs\Inno Setup 6\ISCC.exe"
          if not defined ISCC if exist "%ProgramFiles%\Inno Setup 6\ISCC.exe" set "ISCC=%ProgramFiles%\Inno Setup 6\ISCC.exe"
          if not defined ISCC if exist "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" set "ISCC=C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if not defined ISCC where iscc 2>nul && set "ISCC=iscc"
          if not defined ISCC (echo [X] ISCC not found & exit /b 1)
          echo [OK] ISCC: %ISCC%
          echo [OK] ISCC flags: /Oservice_installer\dist /FIEI_Timer_Faster_Setup_v%VERSION%
          "%ISCC%" ^
            /Oservice_installer\dist ^
            /FIEI_Timer_Faster_Setup_v%VERSION% ^
            "service_installer\installer\setup.iss" || exit /b %errorlevel%
          echo [OK] ISCC compilation finished
          echo === Verifying output ===
          dir service_installer\dist\IEI_Timer_Faster_Setup*.exe || (
            echo [X] ISCC output not found — listing service_installer\dist for diagnosis
            dir service_installer\dist\*.exe 2>nul || echo "(no .exe files in dist/)"
            dir service_installer\dist 2>nul || echo "(dist/ directory does not exist)"
            exit /b 1
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: service_installer/dist/IEI_Timer_Faster_Setup*.exe
          if-no-files-found: error

  # ==========================================================
  #  macOS 构建 (仅 tag push 触发)
  # ==========================================================
  build-macos:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r service_installer/requirements.txt pyinstaller

      - name: Prepare icon
        working-directory: service_installer
        continue-on-error: true
        run: |
          if [ -f "iei_timer.icns" ]; then
            echo "icns already exists"
          elif [ -f "iei_timer.ico" ]; then
            python3 _convert_icon.py 2>/dev/null || true
          else
            echo "no .ico file found"
          fi

      - name: Build (PyInstaller)
        working-directory: service_installer
        run: |
          python3 --version
          pip show pyinstaller
          rm -rf dist 2>/dev/null || true
          python3 -m PyInstaller --noconfirm service.spec

      - name: Package (DMG)
        working-directory: service_installer
        run: |
          VERSION=$(cat ../VERSION)
          rm -rf "dist/IEI Timer Faster" 2>/dev/null || true
          if [ -d "dist/IEI Timer Faster.app" ]; then
            hdiutil create -volname "IEI Timer Faster" -srcfolder "dist/IEI Timer Faster.app" -ov -format UDZO "dist/IEI_Timer_Faster_Setup_v${VERSION}.dmg"
            echo "DMG created: dist/IEI_Timer_Faster_Setup_v${VERSION}.dmg"
          else
            echo "ERROR: .app bundle not found at dist/IEI Timer Faster.app/"
            ls -la dist/ 2>/dev/null || echo "(dist/ empty)"
            exit 1
          fi

      - name: Generate appcast.xml
        shell: bash
        run: |
          VERSION=$(cat VERSION)
          DMG_PATH="service_installer/dist/IEI_Timer_Faster_Setup_v${VERSION}.dmg"
          FILE_SIZE=$(stat -f%z "$DMG_PATH" 2>/dev/null || stat -c%s "$DMG_PATH" 2>/dev/null || echo "")
          python3 tools/generate_appcast.py \
            --dmg-url "https://github.com/tianlinc/gongshi/releases/latest/download/IEI_Timer_Faster_Setup_v${VERSION}.dmg" \
            ${FILE_SIZE:+"--file-size" "$FILE_SIZE"} \
            --output appcast.xml
          echo "[OK] appcast.xml generated"
          cat appcast.xml

      - name: Upload appcast.xml
        uses: actions/upload-artifact@v4
        with:
          name: appcast.xml
          path: appcast.xml
          if-no-files-found: error

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: service_installer/dist/IEI_Timer_Faster_Setup_*.dmg
          if-no-files-found: error

  # ==========================================================
  #  部署 appcast.xml 到 GitHub Pages (仅 tag push 触发)
  # ==========================================================
  deploy-pages:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: appcast.xml
          path: ./appcast

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appcast
          publish_branch: gh-pages
          keep_files: true
          commit_message: 'deploy: update appcast.xml to ${{ github.ref_name }}'

  # ==========================================================
  #  自动创建 GitHub Release 并上传未压缩产物
  # ==========================================================
  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ./release/IEI_Timer_Faster_Setup*.exe
            ./release/IEI_Timer_Faster_Setup_*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
