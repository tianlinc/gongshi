<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEI Timer Faster · 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
<div class="login-split">
    <!-- 左侧品牌宣传区 -->
    <div class="login-brand">
        <div class="login-brand-content">
            <h1>IEI Timer Faster</h1>
            <p class="slogan">
                告别逐格填写，一次搞定一周工时。<br>
                专注研发，让工时填报不再打断你的思路。
            </p>
            <ul class="features">
                <li><i class="bi bi-calendar-check"></i> 月历视图，一眼看清整月工时</li>
                <li><i class="bi bi-magic"></i> 批量填充 + 阶梯比例，智能计算完成率</li>
                <li><i class="bi bi-cloud-arrow-up"></i> 一键同步到 RDM 研发管理平台</li>
                <li><i class="bi bi-people"></i> 全员日报，团队工时一目了然</li>
                <li><i class="bi bi-shield-check"></i> License 激活，安全可控</li>
                <li><i class="bi bi-arrow-repeat"></i> 自动更新，持续迭代</li>
            </ul>
        </div>
    </div>

    <!-- 右侧登录区 -->
    <div class="login-form-side">
        <div class="login-form-wrapper" id="loginFormWrapper">
            <div class="login-card">
                <h2>登录</h2>
                <p class="login-sub">使用 RDM 账号登录工时系统</p>

                <!-- 错误提示条 -->
                <div class="login-alert" id="loginAlert"></div>

                <form id="loginForm" autocomplete="off">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="username" placeholder="用户名" autocomplete="off" required autofocus>
                        <label for="username"><i class="bi bi-person"></i> 用户名</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="password" placeholder="密码" autocomplete="new-password" required>
                        <label for="password"><i class="bi bi-lock"></i> 密码</label>
                    </div>

                    <!-- 记住我 + 清除按钮 -->
                    <div class="remember-row">
                        <div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe" checked>
                                <label class="form-check-label" for="rememberMe">
                                    <i class="bi bi-floppy"></i> 记住我
                                </label>
                            </div>
                        </div>
                        <button type="button" class="clear-link" id="clearBtn" title="清除已保存账号">
                            <i class="bi bi-trash3"></i> 清除已保存账号
                        </button>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span class="btn-text">登录</span>
                        <span class="spinner-border spinner-border-sm" style="display:none;"></span>
                    </button>
                </form>

                <div class="login-footer">
                    <!-- RDM 地址配置入口 -->
                    <div class="login-rdm-config">
                        <button type="button" class="btn-rdm-config"
                                onclick="openRdmConfig()" title="配置 RDM 服务器地址">
                            <i class="bi bi-gear"></i> RDM 地址
                        </button>
                        <span class="rdm-status" id="rdmStatus">
                            <span class="status-checking">
                                <i class="bi bi-arrow-repeat"></i> 检测中...
                            </span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- RDM 配置弹窗 -->
<div class="modal fade" id="rdmConfigModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rdm-config-modal-content">
            <div class="modal-header rdm-config-modal-header">
                <h5 class="modal-title"><i class="bi bi-gear"></i> RDM 服务器配置</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body rdm-config-modal-body">
                <div class="rdm-config-section">
                    <label>RDM 服务器地址</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="rdmUrl"
                               value="http://10.111.36.3:2029">
                        <button class="btn btn-primary" onclick="testRdmConnection()">
                            <i class="bi bi-plug"></i> 检测连通性
                        </button>
                    </div>
                    <small class="text-muted">RDM 研发管理平台的访问地址，修改后全局生效。</small>
                </div>

                <div class="connect-status checking" id="connectStatus" style="display:flex;">
                    <i class="bi bi-arrow-repeat"></i>
                    <span>正在检测 RDM 服务连通性...</span>
                </div>

                <div class="mt-3 d-flex justify-content-between">
                    <button class="btn btn-outline-secondary btn-sm" onclick="resetRdmConfig()">
                        <i class="bi bi-arrow-counterclockwise"></i> 恢复默认
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="saveRdmConfig()">
                        <i class="bi bi-check-lg"></i> 保存配置
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
(function () {
    const LS_USER = STORAGE_KEYS.REMEMBER_USERNAME;
    const LS_PASS = STORAGE_KEYS.REMEMBER_PASSWORD;
    const LS_FLAG = STORAGE_KEYS.REMEMBER_FLAG;

    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const rememberCheck = document.getElementById('rememberMe');
    const loginBtn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('loginAlert');

    /**
     * 自动回填：进入页面时如果有保存的账号密码，填入两个输入框
     */
    function autoFill() {
        if (localStorage.getItem(LS_FLAG) === 'true') {
            const savedUser = localStorage.getItem(LS_USER);
            const savedPass = localStorage.getItem(LS_PASS);
            if (savedUser) {
                usernameInput.value = savedUser;
                rememberCheck.checked = true;
            }
            if (savedPass) {
                passwordInput.value = savedPass;
            }
        } else {
            // 没勾过的，清除历史遗留数据
            localStorage.removeItem(LS_USER);
            localStorage.removeItem(LS_PASS);
            localStorage.removeItem(LS_FLAG);
            rememberCheck.checked = true;  // 默认勾选
        }
    }

    /**
     * 清除已保存账号
     */
    function clearSaved() {
        localStorage.removeItem(LS_USER);
        localStorage.removeItem(LS_PASS);
        localStorage.removeItem(LS_FLAG);
        usernameInput.value = '';
        passwordInput.value = '';
        rememberCheck.checked = true;
        toast('已清除保存的账号密码', 'info');
    }

    /**
     * 表单提交
     */
    async function handleLogin(e) {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
            alertBox.textContent = '用户名或密码不能为空';
            alertBox.style.display = 'block';
            return;
        }

        // 隐藏之前的错误
        alertBox.style.display = 'none';
        loginBtn.querySelector('.btn-text').textContent = '登录中...';
        loginBtn.querySelector('.spinner-border').style.display = 'inline-block';
        loginBtn.disabled = true;

        const data = await apiCall('/api/login', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });

        if (data && data.success) {
            // 保存/清除 localStorage
            if (rememberCheck.checked) {
                localStorage.setItem(LS_USER, username);
                localStorage.setItem(LS_PASS, password);
                localStorage.setItem(LS_FLAG, 'true');
            } else {
                localStorage.removeItem(LS_USER);
                localStorage.removeItem(LS_PASS);
                localStorage.removeItem(LS_FLAG);
            }
            window.location.href = '/dashboard';
        } else {
            alertBox.textContent = (data && data.message) || '登录失败，请稍后重试';
            alertBox.style.display = 'block';
            loginBtn.querySelector('.btn-text').textContent = '登录';
            loginBtn.querySelector('.spinner-border').style.display = 'none';
            loginBtn.disabled = false;
        }
    }

    // 自动回填
    autoFill();

    // 清除
    document.getElementById('clearBtn').addEventListener('click', clearSaved);

    // 登录
    document.getElementById('loginForm').addEventListener('submit', handleLogin);

    // 输入时隐藏错误提示
    usernameInput.addEventListener('input', () => { alertBox.style.display = 'none'; });
    passwordInput.addEventListener('input', () => { alertBox.style.display = 'none'; });

    // RDM 地址初始值（从后端文件读取）+ 自动检测连通性
    getRdmBaseUrl().then(function (savedUrl) {
        if (savedUrl) {
            document.getElementById('rdmUrl').value = savedUrl;
        }
        // 加载完地址后再检测
        autoCheckRdm();
    });
})();
</script>
</body>
</html>
