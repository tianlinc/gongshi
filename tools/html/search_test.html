<script type="text/javascript" src="/scripts/utils/iSelectbox.js?V=V808R08M07SP0802"></script>
<script type="text/javascript">
	$(function(){ initView(); initGroupMenu(); });
	
	function initGroupMenu() {
		if ($("#groupMenu").size() == 0) {
			$("#viewSelect").after(
				"<div id='groupMenu' class='hide menu'>" +
			    "<div class='item' onclick=\"refreshNodeView('');\"><img class='image vhide'/><div class='text'>&#25152;&#26377;&#35760;&#24405;</div></div>" +
			    "<div id='groupMenuStep' class='seperator'></div>" + 
				"<div class='item' onclick='refreshNodeView(1);'><img class='image vhide'/><div class='text'>&#33410;&#28857;&#32423;&#21035; 1</div></div>" +
				"<div class='item' onclick='refreshNodeView(2);'><img class='image vhide'/><div class='text'>&#33410;&#28857;&#32423;&#21035; 2</div></div>" +
				"<div class='item' onclick='refreshNodeView(3);'><img class='image vhide'/><div class='text'>&#33410;&#28857;&#32423;&#21035; 3</div></div>" +
				"<div class='item' onclick='refreshNodeView(4);'><img class='image vhide'/><div class='text'>&#33410;&#28857;&#32423;&#21035; 4</div></div>" +
				"</div>");
		}
	}
	
	function initView(viewId, afterAddView){
		var $s = $("#customSign"); // define the sign for view add operation.
		if ($s.size() == 0) $s = $("<li id='customSign' valid='N' style='color: gray;' onclick='addView();'>-----------------&#26032;&#22686;&#33258;&#23450;&#20041;&#35270;&#22270;-----------------</li>");
		
		var $viewId = $("#viewId").val();
		
		var isCbbStat = '';
		if($viewId && $viewId == "CBB" && !isCbbStat) {
			viewId = "PBS";
			$viewId = "PBS";
		}
		if (viewId && !$viewId) $("#viewId").val(viewId); // for after change view type
		
		var $li = $("#viewItems li[isSystem='Y']:last");
		
		if ($li.size() > 0) $li.after($s); else $("#viewItems").prepend($s);
			
		var $sel = $("#viewSelect").select({
			width: 250,
			onchange: function(v, $sel) {chooseView(v, true);}
		}); 
		var type = $("#_viewEntityType").val();
		if (type != "TSK") {
			if ($sel.prevAll(":visible[id!='projectView']").size() == 0) $sel.css("margin-top", -2);
		}
		
		var _flag = true;
		if (!(type == "TSK" && "" != "Y" && !afterAddView) && "" != "Y") {
			chooseView($viewId, true);
			_flag = false;
			if (type == "TSK" && afterAddView) {
				try {refreshData();} catch(e) {}
			}
		}
		
		if(!viewId && $viewId) {
			viewId = $viewId;
		}
		if(viewId && "" == "Y") {
			$("#viewSelect").selectVal(viewId);
		}
		
		var isDrillTask = false;
		try {isDrillTask = $("#_drillTask").val() == "Y";} catch(e) {isDrillTask = false;}
		
		if (_flag && isDrillTask) {
			chooseView($viewId, true);
		}
	}
	
	function addView(id, isCopy){
		$("#viewItems").hide();
		
		var type = $("#_viewEntityType").val(), p = type == "MTS" ? "bomViewAdd" : "viewAdd";
		var url = powerPath + "pages/rdsys/view/" + p + ".jsf?isSystem=N&type=" + type + "&isTop=Y" + "&isProductStruturePage=&isCbb=";
		
		if (id) { // edit view. 
			$("#viewId").val(id); url += "&id=" + id; 
		}
		if (isCopy) url += "&isCopy=Y"; // it will be remove view if click cancel link while copy one.
		
		var win = window; if ("Y" == "Y") win = parent;
		win.buildPage("view", url);
		try{ iMain.getEvt().cancelBubble = true; }catch(e){}
	}
	
	function previewView(id){
		var type = $("#_viewEntityType").val();
		
		var win = window; if ("Y" == "Y") win = parent;
		var p = type == "MTS" ? "bomViewPreview" : "viewPreview";
		
		win.buildPage("view", powerPath + "pages/rdsys/view/" + p + ".jsf?type=" + type + "&id=" + id + "&isCbb=");
		$("#viewItems").hide();
		try{ iMain.getEvt().cancelBubble = true; }catch(e){}
	}
	
	function copyView(id) {
		$("#viewId").val(id);
		$("#viewForm\\:copy").click();
		$("#viewItems").hide();
		iMain.getEvt().cancelBubble = true; 
	}
	
	function removeView(id){
		rdmConfirm('&#30830;&#23450;&#35201;&#21024;&#38500;&#35813;&#35760;&#24405;&#21527;&#65311;', function(){
			$("#viewId").val(id);
			$("#viewForm\\:remove").click(); 
		});
		$("#viewItems").hide();
		try{ iMain.getEvt().cancelBubble = true; }catch(e){}
	}
	
	function chooseView(id, needSave){
		if (!id) {id = $("#viewItems li[val]:first").attr("val"); if (!id) id = "";}  // choose first as default.
	
		$("#viewId").val(id)
		
		if($.browser.msie)  $("#viewSelect").css("width", "auto");
		var $sel = $("#viewSelect").selectVal(id);
		
		if (needSave)  {
			$("#viewForm\\:save").click(); // save user select view.
		} else {
			doChooseView(id);
		}
	}
	
	function doChooseView(id){
		var $sel = $("#viewSelect");
		var type = $("#_viewEntityType").val();
		var isDrillTask = false;
		try {isDrillTask = $("#_drillTask").val() == "Y";} catch(e) {isDrillTask = false;}
		
		var viewType = $('#viewType').val();
		if (type == "TSK" && !isDrillTask) {
			var url = "";
			if (id == "R") {
				var isResList = "";
				if (isResList == "Y") {
					url = "pages/plan/reourceList.jsf?isChange=Y&"; // resource view
				} else {
					url = "pages/plan/reourceGraph.jsf?isChange=Y&"; // resource view
				}
			} else if (id =="B") {
				url = "pages/plan/burndown.jsf?isChange=Y&"; // burndown char view.
			} else if (id =="T") {
				var _showValid = "";
				url = "pages/plan/trend.jsf?isChange=Y&trendtype=1&showValid=" + _showValid + "&";
			} else if (id =="G") {
				url = "pages/task/list/tree.jsf?isChange=Y&viewId=G&";
			}  else if (id =="S") {
				url = "pages/task/list/myList.jsf?isChange=Y&cate=SDD&";
			}  else if (id =="W") {
				url = "pages/task/list/myList.jsf?isChange=Y&cate=PRV&";
			} else {
				url = "pages/task/list/tree.jsf?isChange=Y&viewId=" + id +"&isCustom=Y&";
			}
			if (location.href && location.href.indexOf(url) > -1)
				return;
				
			var _planId = "";
			var _objectType = "";
			var _projectId = "";
			try {_planId = taskGantt.config.p; } catch(e) {_planId=  "";}
			try {_objectType = taskGantt.config.j; } catch(e) {_objectType=  "";}
			try{_projectId = taskGantt.config.j}catch(e) {_projectId=  "";}
			location.href = powerPath + url + "module=TSK&type=TSK&planId=" + _planId + "&objectType=" + _objectType + (_projectId ? "&projectId="+_projectId : "");
		}else if(type == "MDL" && (id == "CBB" || (viewType && viewType == "CBB"))) {
			var url = "";
			if(id == "CBB") {
				url = "pages/lifecycle/entity/product/productCbbStat.jsf?objectId=&lcType=&isProject=&isChange=Y&module=MDL&type=MDL&isCbbStat=Y&chartUnitId=cbbStatImg&viewId=" + id + "&viewType=" + id;
			}else {
				url = "pages/lifecycle/entity/product/productStructure.jsf?objectId=&lcType=&isProject=&isChange=Y&module=MDL&type=MDL&isChangeType=PBS&viewId=" + id + "&viewType=" + id;
			}
			location.href = powerPath + url;
		}else {
			var win = window; 
			try{
				if ("Y" == "Y") win = parent.$("div.tabs-header:last").rdmtabs("getSelectedFrame")[0].contentWindow;
			} catch(e){}
	
			try {
				win.refreshFull(); // the interface from list.
			} catch(e) {
				iList.refresh(true);
			}
			
			if($.browser.msie)  $sel.width($("span:eq(0)", $sel).width() + 30); 
		}
	}
	
	function editPbsView(e) {
		try{ iMain.getEvt().cancelBubble = true; }catch(e){}
		showModDialog(powerPath + "pages/common/util/columnConfig.jsf?module=MDL&cate=1&type=PBS", 700, 435, window);
	}
	
	function afterCopyView(id){
		$("#viewId").val(id); addView(id, true); // enter eidt page after copy.
	}
	
	function afterRemoveView(){
		$("#viewItems").hide();
		$("#viewItems li[val='" + $("#viewId").val() + "']").remove();
		chooseView("", true); // choose first view after delete.
	}
	
	function refreshView(id){
		$("#viewId").val(id);
		$("#viewForm\\:refresh").click();
	}
	
	function adjustFieldWidth(f, width){
		if ($("#viewItems li[val='" + $("#viewId").val() + "']").attr("isSystem") == "N") {
			$("#activeField").val(f);
			$("#fieldWidth").val(width);
			$("#viewForm\\:changeWidth").click();	
		}
	}
	
	function adjustFieldPostion(f1, f2){
		if ($("#viewItems li[val='" + $("#viewId").val() + "']").attr("isSystem") == "N") {
			$("#activeField").val(f1);
			$("#targetField").val(f2);
			$("#viewForm\\:changePosition").click();
		}
	}
	
	function adjustFieldSort(fName, sortType) {
		if (!checkSystemView()) {
			$("#_sortField").val(fName);
			$("#_sortFieldType").val(sortType);
			$("#viewForm\\:changeSort").click();	
		}
	}
	
	function checkSystemView() {
		return $("#viewItems li[val='" + $("#viewId").val() + "']").attr("isSystem") == "Y";
	}
</script>

<script>

	/* the parent page is call by ajax */
	
	
	/**
		id: document ID or attachment ID
		type: attachment type
	*/
	function downloads(id, type) {
		$("#_file_downform").attr("target", "_top"); // reset target to "_top", because pdm download use target "top" 
		
		// get the down load storage IP,Port,Address.
		jUploadConfigBean.dyn_getDownConfig(id, type ? type : "", {
			callback: function(r){
				if (r) { _sendDownRequest(r); }
			}
		});	
	}
	
	/** check file and send the request to download file. */
	function _sendDownRequest(r) {
	
		stopClear(3);
		
		try {
			parent.setClear();
		} catch (e) {
		}
	
		if (r.length == 1 && r[0] == "N") {
			rdmAlert($("#_fileNotExistMsg").html());
		} else if (r.length == 2 && r[0] == "PDM") { // old document
		    downloadPdmDocument(r[1]);
		} else {
			$("#_file_dir").val(r[2]);
			$("#_file_address").val(r[3]);
			$("#_file_name").val(r[4]);
			$("#_file_extname").val(r[5]);
			var httpType = "http";
			/* remove the target.*/
			if ($.browser.safari) { $("#_file_downform").attr("target", ""); }
			
			var servlet;
			if(!r[0]){
				servlet = powerPath + "download";
			} else if((location.href.indexOf("localhost") >= 0 && "localhost" == r[0]) || (location.href.indexOf("127.0.0.1") >= 0 && "127.0.0.1" == r[0]) ) {
				servlet = powerPath + "download";  // local host.
			} else if (r[0] != "localhost" && r[0] != "127.0.0.1" ) {
				servlet = httpType + "://" + r[0] + ":" + r[1] + "/download";
			} else {
				var href = location.href;
				href = href.replaceAll("http://",""); 
				var ip = href.substring(0,href.indexOf(":"));
				var prot = href.substring(href.indexOf(":") + 1,href.indexOf("/"));
				
				servlet = httpType + "://" + ip + ":" + prot + "/download";
			}
			$("#_file_downform").attr("action", servlet).submit();
		}
	}
	
		/** batch download  files. */
	function batchDownload(id, type) {
		var objectId = "";
		var servlet = powerPath + "down?type=BATCH_DOWN&fId=" + id + "&objectType=" + type + "&objectId=" + objectId;
		
		/* remove the target.*/
		if ($.browser.safari) { $("#_file_downform").attr("target", ""); }
		
		$("#_file_downform").attr("action", servlet).submit();
	}
	
	/** download baseline. */
	function downloadBaseline(id) {
		var servlet = powerPath + "down?type=DBL&fId=" + id;
		
		/* remove the target.*/
		if ($.browser.safari) { $("#_file_downform").attr("target", ""); }
		
		$("#_file_downform").attr("action", servlet).submit();
	}
	
	/* download old documetn -- 'PDM Document'*/
	function downloadPdmDocument(objectId){
        var servlet = powerPath + 'down?docId=' + objectId + '&rand=' + Math.random();
        
        /* remove the target.*/
		$("#_file_downform").attr("target", "top");
		
		$("#_file_downform").attr("action", servlet).submit();
	}
</script>

					window.location.href = powerPath + "pages/lifecycle/entity/material/mtrSearch.jsf?workflowType=MTR&lcType=MTR&type=MTR&pageType=SEARCH"; return;
				} else if (workflowType == "DOC") { 
					window.location.href = powerPath + "pages/lifecycle/entity/document/docSearch.jsf?workflowType=DOC&lcType=DOC&type=DOC&pageType=SEARCH"; return; 
				} 
			}
			window.location.href = powerPath + "pages/workflow/workflowDataSearch.jsf?type=" + workflowType + "&workflowType=" + workflowType + "&queryType=" + qt + "&pageType=SEARCH&menuId=" + menuId + "&r=" + pr;
		}
	
		/* Set workflow instance relate project */
    	function resetRelateEntity() {
	        if (parent.objectType == "PJT") {
				var $id = $("input:[fname='ProjectID']");
	    		var id = parent.objectId, val = parent.$("span.title-span").attr("sname");
	    		if ($id.size() <= 0) {
	    			$("#searchTab").append($("<tr style='display:none;'><td>"
	    			    + "</td><td id='ProjectID' name='ProjectID'" 
	    			    + "class='rightColumn3'><input fname='ProjectID'"
	    			    + " htype='PROJECT' type='hidden'/></td></tr>"));
	    		    $id = $("input:[fname='ProjectID']");
	    		}
	    		if (!val) {
	    			val = parent.parent.$("span.title-span").attr("sname");
	    		}
	    		if (!$id.attr("ids")) {
		    	    $id.attr("ids",id).val(val);
		    	}
	    	}
    	}
    	
    	function custom_getPageByWorkflowDataSearch($obj) {
    		var hc = typeof($obj.attr("param")) == "undefined";
    		var tagName = $obj.parent().attr("tagName");
    		if (!hc && (tagName == "td" || tagName == "TD") ) {
    			return "selectMulForCustom.jsf";
    		}
    		return "selectMul.jsf";
    	}
